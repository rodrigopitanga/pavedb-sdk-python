stages:
  - mirror
  - test

mirror-github:
  image: alpine:3.20
  stage: mirror
  variables:
    GITHUB_MIRROR_REPO: rodrigopitanga/pavedb-sdk-python
  before_script:
    - apk add --no-cache git
  script:
    - |
      test -n "${GITHUB_MIRROR_TOKEN:-}" || {
        echo "GITHUB_MIRROR_TOKEN is missing"
        exit 1
      }
    - git remote remove github-mirror 2>/dev/null || true
    - |
      github_url="https://x-access-token:${GITHUB_MIRROR_TOKEN}"
      github_url="${github_url}@github.com/${GITHUB_MIRROR_REPO}.git"
      git remote add github-mirror "$github_url"
    - |
      main_ref="+refs/heads/${CI_DEFAULT_BRANCH}:"
      main_ref="${main_ref}refs/remotes/origin/${CI_DEFAULT_BRANCH}"
      git fetch origin "$main_ref" "+refs/tags/*:refs/tags/*"
    - |
      main_dst="refs/remotes/origin/${CI_DEFAULT_BRANCH}:"
      main_dst="${main_dst}refs/heads/${CI_DEFAULT_BRANCH}"
      git push github-mirror "$main_dst"
    - git push github-mirror "refs/tags/*:refs/tags/*"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

python:
  image: python:3.12
  stage: test
  script:
    - python -m pip install --upgrade pip
    - python -m pip install -e .[test]
    - python -m compileall -q pavesdk
    - python -m pytest
